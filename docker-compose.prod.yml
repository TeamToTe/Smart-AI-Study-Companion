version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: transcription_redis_prod
    expose:
      - "6379"
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcription_web_prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - SUPABASE_URL=${SUPABASE_URL}
      - ANON_KEY=${ANON_KEY}
      - SUPABASE_JWT=${SUPABASE_JWT}
    volumes:
      - transcription_storage:/app/app/storage
    depends_on:
      - redis
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transcription_worker_prod
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEYS=${GROQ_API_KEYS}
      - SUPABASE_URL=${SUPABASE_URL}
      - ANON_KEY=${ANON_KEY}
      - SUPABASE_JWT=${SUPABASE_JWT}
    volumes:
      - transcription_storage:/app/app/storage
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: transcription_frontend_prod
    expose:
      - "80"
    ports:
      - "8080:80"
    depends_on:
      - web
    restart: always

volumes:
  transcription_storage:
    name: transcription_storage
