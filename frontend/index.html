<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/logo.png" />
    <script>
      (function() {
        const favicon = document.getElementById('favicon');
        if (!favicon) return;
        const img = new Image();
        img.src = '/logo.png';
        const updateFavicon = () => {
          const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const canvas = document.createElement('canvas');
          canvas.width = 32;
          canvas.height = 32;
          const ctx = canvas.getContext('2d');
          if (isDark) {
            ctx.filter = 'invert(1)';
          }
          ctx.drawImage(img, 0, 0, 32, 32);
          favicon.href = canvas.toDataURL();
        };
        img.onload = updateFavicon;
        const matcher = window.matchMedia('(prefers-color-scheme: dark)');
        if (matcher.addEventListener) {
          matcher.addEventListener('change', updateFavicon);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMind - Smart AI Study Companion</title>
    <!-- Plus Jakarta Sans for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
